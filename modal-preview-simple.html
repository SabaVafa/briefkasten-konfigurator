<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Recovery Modal Simple Preview</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f3f4f6;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:40px 20px;overflow-y:auto;}
    input,textarea,button{font-family:inherit;}
    a{color:inherit}
  </style>
</head>
<body>

<div style="background:#fff;border-radius:16px;width:100%;max-width:520px;
            box-shadow:0 20px 60px rgba(0,0,0,0.14);overflow:hidden;
            font-family:system-ui,sans-serif;">

  <!-- Header -->
  <div style="padding:28px 28px 0;display:flex;align-items:flex-start;gap:14px;">
    <div style="width:48px;height:48px;border-radius:50%;background:#e8f5ee;
                display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#1a6b47" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <div style="flex:1;">
      <div style="font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:8px;">
        Konfiguration anfragen
      </div>
      <p style="font-size:14px;color:#4b5563;line-height:1.7;">
        Schreiben Sie uns — wir helfen Ihnen gerne weiter und melden uns umgehend per E-Mail.
      </p>
    </div>
  </div>

  <!-- Config URL box -->
  <div style="margin:16px 28px 0;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px;">
    <div style="font-size:11px;font-weight:600;color:#6b7280;
                text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">
      Ihre Konfiguration
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="rm-url-display"
            style="font-size:11px;color:#4b5563;flex:1;
                   white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        https://edelstahl-tuerklingel.de/configurator?color=brushed&units=3&module=VDM10
      </span>
      <button id="rm-copy-btn" onclick="copyUrl()" aria-label="Konfigurationslink kopieren"
              style="flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;
                     display:flex;align-items:center;color:#6b7280;transition:color 0.2s;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Actions -->
  <div style="padding:20px 28px 28px;display:flex;flex-direction:column;gap:10px;">

    <!-- Email -->
    <a href="mailto:service@metzlergmbh.de"
       style="display:flex;align-items:center;gap:14px;
              border:1.5px solid #e5e7eb;border-radius:10px;
              padding:14px 16px;text-decoration:none;">
      <div style="width:36px;height:36px;border-radius:8px;background:#e8f5ee;
                  display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="#1a6b47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:700;color:#4b5563;">E-Mail schreiben</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
          <span style="font-size:14px;color:#4b5563;">service@metzlergmbh.de</span>
          <button onclick="event.preventDefault();copyEmail(this)" aria-label="E-Mail-Adresse kopieren"
                  style="background:none;border:none;cursor:pointer;padding:0;
                         display:flex;align-items:center;line-height:1;color:#6b7280;transition:color 0.2s;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- Right arrow -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="#4b5563" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
           style="flex-shrink:0;">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

  </div>
</div>

<script>
  function copyText(text){
    if(navigator.clipboard&&navigator.clipboard.writeText)
      return navigator.clipboard.writeText(text);
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    return Promise.resolve();
  }

  function copyEmail(btn){
    copyText('service@metzlergmbh.de').then(()=>{
      btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#009951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(()=>{
        btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      },2000);
    });
  }

  function copyUrl(){
    const url='https://edelstahl-tuerklingel.de/configurator?color=brushed&units=3&module=VDM10';
    copyText(url).then(()=>{
      const btn=document.getElementById('rm-copy-btn');
      btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#009951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(()=>{
        btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      },2000);
    });
  }
</script>
</body>
</html>
